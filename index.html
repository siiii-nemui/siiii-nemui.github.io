<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRPG ツールポータル</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div class="logo">TRPG ツールライブラリ</div>
        <nav>
            <ul>
                <li><a href="#dice">ダイス</a></li>
                <li><a href="#growth">成長チェック</a></li>
                <li><a href="#download">ダウンロード</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="grid">
            <section class="card" id="dice">
                <div class="icon">🎲</div>
                <h2>ダイスツール</h2>
                <p>1d100から各種システムに対応した、ブラウザで動く汎用ダイスローラーです。</p>
                <a href="#" class="btn">ツールを開く</a>
            </section>

            <section class="card" id="growth">
                <div class="icon">📈</div>
                <h2>成長チェック</h2>
                <p>セッション後の技能成長や経験点計算をスムーズに行うための管理ツールです。</p>
                <a href="#" class="btn">ツールを開く</a>
            </section>

            <section class="card" id="download">
                <div class="icon">📥</div>
                <h2>ダウンロード</h2>
                <p>オフラインで使えるPDFシートや、専用の配布ファイルを掲載しています。</p>
                <a href="#" class="btn">配布ページへ</a>
            </section>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 椎. All Rights Reserved.</p>
    </footer>

</body>

</html>
