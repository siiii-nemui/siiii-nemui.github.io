<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CoC6 成長チェック</title>

    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="growth.css" />

    <link rel="icon" href="image/hpicon.png" sizes="any" />
    <link rel="apple-touch-icon" href="image/hpicon.png" sizes="256x256" />
    <link rel="icon" type="image/png" href="image/hpicon.png" sizes="256x256" />
  </head>

  <body>
    <header>
      <div class="logo"><a href="../index.html">しいたけTOOLs</a></div>
      <nav>
        <ul>
          <li><a href="#dice">ダイス</a></li>
          <li><a href="growth.html">成長チェック</a></li>
          <li><a href="#download">ダウンロード</a></li>
        </ul>
      </nav>
    </header>

    <div class="page-container">
      <main class="growth-main">
        <div class="upload-section">
          <input type="file" id="log-file" accept=".html" />
          <span>ココフォリアのログ(.html)を選択</span>
        </div>

        <div class="display-mode-controls">
          <button
            class="mode-btn active"
            id="mode-timeline"
            onclick="changeDisplayMode('timeline')"
          >
            時系列表示
          </button>
          <button
            class="mode-btn"
            id="mode-category"
            onclick="changeDisplayMode('category')"
          >
            C / F 表示
          </button>
        </div>

        <div id="display-area" class="display-area">
          <p class="placeholder">
            ログを読み込むとここに解析結果が表示されます
          </p>
        </div>

        <div class="text-output">
          <label>テキスト出力</label>
          <textarea id="output-text" spellcheck="false"></textarea>
        </div>
      </main>

      <aside class="sidebar">
        <div class="filter-controls">
          <div class="control-item">
            <label>決定的成功</label>
            <input type="checkbox" class="toggle" id="f-critical" checked />
          </div>
          <div class="control-item">
            <label>スペシャル</label>
            <input type="checkbox" class="toggle" id="f-special" />
          </div>
          <div class="control-item">
            <label>致命的失敗</label>
            <input type="checkbox" class="toggle" id="f-fumble" checked />
          </div>
          <div class="control-item">
            <label>成功</label>
            <input type="checkbox" class="toggle" id="f-success" />
          </div>
          <div class="control-item">
            <label>失敗</label>
            <input type="checkbox" class="toggle" id="f-failure" />
          </div>
          <div class="control-item">
            <label>初期値成功</label>
            <input type="checkbox" class="toggle" id="f-initial" checked />
          </div>
          <div class="control-item">
            <label>重複を排除</label>
            <input type="checkbox" class="toggle" id="f-unique" />
          </div>
          <div class="control-item">
            <label>能力値除外</label>
            <input type="checkbox" class="toggle" id="f-exclude-stats" />
          </div>
        </div>

        <hr />

        <div class="filter-detail">
          <button class="filter-btn" onclick="toggleFilterDetail()">
            ▽ 出目フィルタ
          </button>
          <div id="filter-inputs" style="display: none">
            <div class="input-row">
              <span>以上</span><input type="number" id="val-min" />
            </div>
            <div class="input-row">
              <span>等しい</span><input type="number" id="val-eq" />
            </div>
            <div class="input-row">
              <span>以下</span><input type="number" id="val-max" />
            </div>
            <button class="clear-btn" onclick="clearDiceFilter()">
              クリア
            </button>
          </div>
        </div>

        <div class="exclude-section">
          <div class="input-block">
            <label for="after-string">特定の文字列以降を抽出する</label>
            <input
              type="text"
              id="after-string"
              placeholder="特定の文字列を入力"
            />
          </div>

          <div class="input-block">
            <label for="exclude-tab-input">除外するタブ名</label>
            <div class="inline-input">
              <input
                type="text"
                id="exclude-tab-input"
                placeholder="タブ名を入力"
              />
              <button class="add-btn" onclick="addExcludeTab()">追加</button>
            </div>
            <div id="exclude-tabs-list"></div>
          </div>
        </div>

        <div class="input-block">
          <label>人物一覧（ドラッグで並び替え / クリックで表示切替）</label>
          <div id="user-list" class="user-list-container"></div>
        </div>

        <button class="main-copy-btn">コピー</button>
      </aside>
    </div>

    <footer>
      <p>
        &copy; 2026 椎(<a href="https://x.com/siiii_nemui">@siiii_nemui</a>).
        All Rights Reserved.
      </p>
    </footer>

    <script src="growth.js"></script>
  </body>
</html>
