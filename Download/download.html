<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ダウンロード</title>
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="download.css" />
    <link rel="icon" href="../image/hpicon.png" sizes="any" />
    <link rel="apple-touch-icon" href="../image/hpicon.png" sizes="256x256" />
    <link
      rel="icon"
      type="image/png"
      href="../image/hpicon.png"
      sizes="256x256"
    />
    <script src="../js/include.js" defer></script>
  </head>
  <body>
    <div data-include="../components/header.html"></div>

    <main>
      <h1 class="tool-title">素材・ツール配布</h1>

      <div class="download-grid">
        <div class="download-card">
          <div class="card-header">
            <span class="category-badge">TOOL</span>
            <h3>保管所駒出力ツール</h3>
          </div>
          <p>
            保管所のCSからココフォリア用の駒を出力するためのChrome
            拡張機能です。
          </p>
          <a
            href="https://github.com/siiii-nemui/nica_cs_tool/archive/refs/heads/main.zip"
            class="download-btn"
            >ZIPをダウンロード</a
          >
        </div>

        <div class="download-card disabled">
          <div class="card-header">
            <span class="category-badge">MATERIAL</span>
            <h3>more...</h3>
          </div>
          <p>またなんかつくるかも。</p>
          <span class="status-label">Coming Soon</span>
        </div>
      </div>

      <section class="update-history">
        <h3>更新履歴</h3>
        <div class="history-container">
          <ul>
            <li><strong>2026/03/09</strong> - ダウンロードページ 公開</li>
          </ul>
        </div>
      </section>
    </main>

    <div data-include="../components/footer.html"></div>
  </body>
</html>
